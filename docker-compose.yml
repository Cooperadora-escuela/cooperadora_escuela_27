version: '3.8'

networks:
  cooperadora_network:
    driver: bridge

services:
  postgres:
    image: postgres:15-alpine
    container_name: cooperadora_docker_db
    environment:
      POSTGRES_DB: cooperadora_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"               # Expone el puerto en tu host (opcional)
    volumes:
      - postgres_data:/var/lib/postgresql/data   # Persistencia de datos
    networks:
      - cooperadora_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_cooperadora
    environment:
      PGADMIN_DEFAULT_EMAIL: cooperadora@cooperadora.com
      PGADMIN_DEFAULT_PASSWORD: cooperadora
    ports:
      - "5050:80"                  # Accedes a pgAdmin en http://localhost:5050
    depends_on:
      - postgres
    networks:
      - cooperadora_network

  api:
    build: ./back                       # Usa el Dockerfile en el directorio actual
    container_name: cooperadora_api
    ports:
      - "8000:8000"                # Accedes a la API en http://localhost:8000
    environment:
      - SECRET_KEY=django-insecure-oid1ss30=a%amea1noa%7)7ch=^f#e(1j0g#$_e@x78kc#@jmg
      - DB_ENGINE=django.db.backends.postgresql
      - DB_NAME=cooperadora_db
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=postgres            # Nombre del servicio, no 127.0.0.1
      - DB_PORT=5432
      - DEBUG=1                     # Opcional, para modo desarrollo
    depends_on:
      - postgres
    networks:
      - cooperadora_network

volumes:
  postgres_data: